name: Build STM32 Firmware

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy source code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Python (PlatformIO cần)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 3. Cài PlatformIO
      - name: Install PlatformIO
        run: pip install platformio

      # 4. Build firmware
      - name: Build
        run: pio run

      # 5. Upload artifact (file build)
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/**/firmware.*
